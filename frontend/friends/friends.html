<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrainrotStars - Amis</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="../index/style.css">
    <link rel="stylesheet" href="friends.css">
    <link rel="icon" type="image/x-icon" href="https://raw.githubusercontent.com/schoolllex/images/refs/heads/main/BrainrotStar/favicon.ico">
</head>
<body>
    <div class="background-glow">
        <div class="glow-1"></div>
        <div class="glow-2"></div>
    </div>

    <div class="container">
        <header class="navbar">
            <div class="logo">
                <a href="../index/index.html" class="nav-link">
                    <img src="https://raw.githubusercontent.com/schoolllex/images/refs/heads/main/BrainrotStar/BrainrotStar_logo_fc.png" alt="Brainrot Star" class="logo-image">
                </a>
            </div>
            <button class="nav-toggle" type="button" aria-label="Ouvrir le menu" aria-expanded="false">
                <i data-lucide="menu"></i>
            </button>
            <div class="nav-buttons">
                <a href="../index/index.html" class="btn-nav nav-link">
                    <i data-lucide="home"></i>
                    <span>Accueil</span>
                </a>
                <a href="../ranking/ranking.html" class="btn-nav ranking nav-link">
                    <i data-lucide="trophy"></i>
                    <span>Classement</span>
                </a>
                <a href="../friends/friends.html" class="btn-nav friends nav-link has-badge">
                    <i data-lucide="users"></i>
                    <span>Amis</span>
                    <span class="nav-badge">0</span>
                </a>
                <a href="../rebirth/rebirth.html" class="btn-nav rebirth nav-link">
                    <i data-lucide="refresh-ccw"></i>
                    <span>Rebirth</span>
                </a>
                <a href="../credits/credits.html" class="btn-nav nav-link">
                    <i data-lucide="info"></i>
                    <span>Infos du jeu</span>
                </a>
            </div>
        </header>

        <main class="friends-content">
            <section class="friends-hero">
                <h1>Mes Amis</h1>
                <p>Invite, suis et défie tes potes pour grimper plus vite.</p>
            </section>

            <section class="profile-card">
                <h2><i data-lucide="user"></i> Mon Profil</h2>
                <div class="profile-info">
                    <p class="profile-pseudo">Votre pseudo: <span id="current-pseudo">...</span></p>
                </div>
                <form id="update-pseudo-form" class="profile-form">
                    <div class="profile-input-group">
                        <input id="new-pseudo-input" type="text" maxlength="24" placeholder="Nouveau pseudo" required>
                        <button type="submit">
                            <i data-lucide="check"></i>
                            <span>Modifier</span>
                        </button>
                    </div>
                    <p id="profile-feedback" class="profile-feedback" aria-live="polite"></p>
                </form>
            </section>

            <section class="friends-grid">
                <article class="friends-card add-friend-card">
                    <h2><i data-lucide="user-plus"></i> Ajouter un ami</h2>
                    <div class="invite-row">
                        <input type="text" placeholder="Pseudo de l'ami">
                        <button type="button">Envoyer</button>
                    </div>
                </article>

                <article class="friends-card">
                    <h2><i data-lucide="user-round-plus"></i> Vos demandes d'amis</h2>
                    <div class="request-list">
                    </div>
                </article>
            </section>

            <section class="friends-list-card">
                <div class="friends-list-head">
                    <h2>Liste d'amis</h2>
                </div>

                <div class="friends-list">
                </div>
            </section>
        </main>
    </div>

    <div id="global-loader" class="global-loader hidden" aria-hidden="true">
        <div class="global-loader-spinner"></div>
    </div>

    <script src="../assets/mobile-nav.js"></script>
    <script src="../assets/loading.js"></script>
    <script src="../assets/auth-gate.js"></script>
    <script src="../assets/notif.js"></script>
    <script src="friends.js"></script>
</body>
</html>
