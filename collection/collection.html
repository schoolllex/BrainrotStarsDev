<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrainrotStars - Collection</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="../index/style.css">
    <link rel="stylesheet" href="collection.css">
    <link rel="icon" type="image/x-icon" href="https://raw.githubusercontent.com/schoolllex/images/refs/heads/main/BrainrotStar/favicon.ico">
</head>
<body>
    <div class="background-glow">
        <div class="glow-1"></div>
        <div class="glow-2"></div>
    </div>

    <div class="container">
        <header class="navbar">
            <div class="logo">
                <a href="../index/index.html">
                    <img src="https://raw.githubusercontent.com/schoolllex/images/refs/heads/main/BrainrotStar/BrainrotStar_logo_fc.png" alt="Brainrot Star" class="logo-image">
                </a>
            </div>
            <button class="nav-toggle" type="button" aria-label="Ouvrir le menu" aria-expanded="false">
                <i data-lucide="menu"></i>
            </button>
            <div class="nav-buttons">
                <a href="../index/index.html" class="btn-nav nav-link">
                    <i data-lucide="home"></i>
                    <span>Accueil</span>
                </a>
                <a href="../ranking/ranking.html" class="btn-nav ranking nav-link">
                    <i data-lucide="trophy"></i>
                    <span>Classement</span>
                </a>
                <a href="../friends/friends.html" class="btn-nav friends nav-link has-badge">
                    <i data-lucide="users"></i>
                    <span>Amis</span>
                    <span class="nav-badge hidden"></span>
                </a>
                <a href="../rebirth/rebirth.html" class="btn-nav rebirth nav-link">
                    <i data-lucide="refresh-ccw"></i>
                    <span>Rebirth</span>
                </a>
                <a href="../credits/credits.html" class="btn-nav nav-link">
                    <i data-lucide="info"></i>
                    <span>Infos du jeu</span>
                </a>
            </div>
        </header>

        <main class="content">
            <h1 class="collection-title">Ma Collection</h1>
            
            <div class="filter-sort-container">
                <div class="filter-section">
                    <h3>Filtrer par</h3>
                    <div class="filter-options">
                        <select id="filter-rarity" class="filter-select">
                            <option value="all">Toutes les raretés</option>
                        </select>
                        <select id="filter-owned" class="filter-select">
                            <option value="all">Tous</option>
                            <option value="owned">Possédés</option>
                            <option value="locked">Non possédés</option>
                        </select>
                    </div>
                </div>
                
                <div class="sort-section">
                    <h3>Trier par</h3>
                    <select id="sort-by" class="filter-select">
                        <option value="normal">Normal</option>
                        <option value="cps">Pièces/sec</option>
                        <option value="level">Niveau</option>
                        <option value="rarity-asc">Rareté (- → +)</option>
                        <option value="rarity-desc">Rareté (+ → -)</option>
                    </select>
                </div>
            </div>

            <div id="collection-grid" class="collection-grid">
            </div>
        </main>
    </div>

    <div id="global-loader" class="global-loader hidden" aria-hidden="true">
        <div class="global-loader-spinner"></div>
    </div>

    <script src="../assets/mobile-nav.js"></script>
    <script src="../assets/rebirth-reveal.js"></script>
    <script src="../assets/loading.js"></script>
    <script src="../assets/auth-gate.js"></script>
    <script src="../assets/notif.js"></script>
    <script src="brainrot-data.js"></script>
    <script src="collection.js"></script>
</body>
</html>
